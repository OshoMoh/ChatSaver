<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatSaver — Your AI Conversations, Forever</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh}
header{padding:20px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#10a37f,#0d8a6a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.container{max-width:1200px;margin:0 auto;display:flex;height:calc(100vh - 65px)}
.sidebar{width:300px;border-right:1px solid rgba(255,255,255,0.05);overflow-y:auto;padding:10px}
.sidebar h3{font-size:12px;color:#666;text-transform:uppercase;padding:10px;letter-spacing:1px}
.convo{padding:12px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:all 0.2s}
.convo:hover{background:rgba(255,255,255,0.05)}
.convo.active{background:rgba(16,163,127,0.15);border-left:3px solid #10a37f}
.convo-title{font-size:14px;font-weight:600;margin-bottom:4px}
.convo-preview{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.convo-date{font-size:11px;color:#555;margin-top:4px}
.main{flex:1;display:flex;flex-direction:column}
.chat-area{flex:1;overflow-y:auto;padding:20px}
.msg{max-width:80%;padding:12px 16px;border-radius:12px;margin-bottom:12px;line-height:1.5;font-size:14px}
.msg.user{background:#1a1a2e;margin-left:auto;border-bottom-right-radius:4px}
.msg.assistant{background:rgba(16,163,127,0.1);border-bottom-left-radius:4px}
.msg .role{font-size:11px;color:#888;margin-bottom:4px}
.input-area{padding:16px;border-top:1px solid rgba(255,255,255,0.05)}
.import-box{background:rgba(255,255,255,0.03);border:2px dashed rgba(255,255,255,0.1);border-radius:12px;padding:40px;text-align:center;margin:20px}
.import-box h2{font-size:18px;margin-bottom:10px}
.import-box p{color:#888;font-size:13px;margin-bottom:20px}
.btn{background:#10a37f;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:#0d8a6a}
.stats{display:flex;gap:20px;padding:15px;border-bottom:1px solid rgba(255,255,255,0.05)}
.stat{text-align:center}
.stat-num{font-size:20px;font-weight:800;color:#10a37f}
.stat-label{font-size:10px;color:#666;text-transform:uppercase}
.search-box{width:100%;padding:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:13px;margin-bottom:10px}
.search-box:focus{border-color:#10a37f;outline:none}
.empty{text-align:center;padding:60px;color:#666}
.empty-icon{font-size:48px;margin-bottom:16px}
.export-btn{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;margin-left:10px}
</style>
</head>
<body>
<header>
<span class="logo">💬 ChatSaver</span>
<div>
<button class="btn" onclick="showImport()">📥 Import</button>
<button class="export-btn" onclick="exportAll()">📤 Export All</button>
</div>
</header>

<div class="container">
<div class="sidebar">
<div class="stats">
<div class="stat"><div class="stat-num" id="totalConvos">0</div><div class="stat-label">Conversations</div></div>
<div class="stat"><div class="stat-num" id="totalMessages">0</div><div class="stat-label">Messages</div></div>
</div>
<input type="text" class="search-box" placeholder="🔍 Search conversations..." oninput="searchConversations(this.value)">
<h3>Conversations</h3>
<div id="convoList"></div>
</div>

<div class="main">
<div class="chat-area" id="chatArea">
<div class="empty" id="emptyState">
<div class="empty-icon">💬</div>
<h2>No conversation selected</h2>
<p>Import your ChatGPT conversations or create a new one</p>
<br>
<button class="btn" onclick="showImport()">📥 Import from ChatGPT</button>
</div>
</div>
</div>
</div>

<!-- Import Modal -->
<div id="importModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:100;display:none;align-items:center;justify-content:center">
<div style="background:#1a1a2e;border-radius:16px;padding:30px;max-width:500px;width:90%">
<h2 style="margin-bottom:16px">📥 Import Conversations</h2>
<p style="color:#888;font-size:13px;margin-bottom:20px">Export your data from ChatGPT (Settings → Data Controls → Export) and upload the conversations.json file here.</p>
<input type="file" id="fileInput" accept=".json" style="margin-bottom:20px">
<div id="importStatus"></div>
<button class="btn" onclick="doImport()">Import</button>
<button class="export-btn" onclick="closeImport()">Cancel</button>
</div>
</div>

<script>
let conversations = JSON.parse(localStorage.getItem('chatsaver_convos') || '[]');
let activeConvo = null;

function save() {
    localStorage.setItem('chatsaver_convos', JSON.stringify(conversations));
    updateStats();
}

function updateStats() {
    document.getElementById('totalConvos').textContent = conversations.length;
    const totalMsgs = conversations.reduce((sum, c) => sum + (c.messages?.length || 0), 0);
    document.getElementById('totalMessages').textContent = totalMsgs;
}

function renderList(filter = '') {
    const list = document.getElementById('convoList');
    const filtered = conversations.filter(c => 
        c.title.toLowerCase().includes(filter.toLowerCase()) ||
        c.messages?.some(m => m.content?.toLowerCase().includes(filter.toLowerCase()))
    );
    
    list.innerHTML = filtered.map((c, i) => `
        <div class="convo ${activeConvo === i ? 'active' : ''}" onclick="openConvo(${conversations.indexOf(c)})">
            <div class="convo-title">${c.title || 'Untitled'}</div>
            <div class="convo-preview">${c.messages?.[0]?.content?.substring(0, 50) || 'No messages'}...</div>
            <div class="convo-date">${new Date(c.create_time * 1000).toLocaleDateString()}</div>
        </div>
    `).join('');
}

function openConvo(index) {
    activeConvo = index;
    const convo = conversations[index];
    const chatArea = document.getElementById('chatArea');
    document.getElementById('emptyState').style.display = 'none';
    
    chatArea.innerHTML = convo.messages.map(m => `
        <div class="msg ${m.role}">
            <div class="role">${m.role === 'user' ? '👤 You' : '🤖 ChatGPT'}</div>
            ${m.content}
        </div>
    `).join('');
    
    renderList();
}

function showImport() {
    document.getElementById('importModal').style.display = 'flex';
}

function closeImport() {
    document.getElementById('importModal').style.display = 'none';
}

function doImport() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) { alert('Select a file first'); return; }
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            const imported = Array.isArray(data) ? data : [data];
            
            let count = 0;
            imported.forEach(convo => {
                if (convo.mapping) {
                    // Convert ChatGPT export format
                    const messages = Object.values(convo.mapping)
                        .filter(m => m.message?.content?.parts?.length)
                        .map(m => ({
                            role: m.message.role,
                            content: m.message.content.parts.join('\n')
                        }));
                    
                    conversations.push({
                        title: convo.title || 'Imported Chat',
                        create_time: convo.create_time,
                        messages: messages
                    });
                    count++;
                } else if (convo.messages) {
                    conversations.push(convo);
                    count++;
                }
            });
            
            save();
            renderList();
            document.getElementById('importStatus').innerHTML = `<p style="color:#10a37f">✅ Imported ${count} conversations!</p>`;
            
            setTimeout(() => closeImport(), 2000);
        } catch(err) {
            document.getElementById('importStatus').innerHTML = `<p style="color:red">❌ Error: ${err.message}</p>`;
        }
    };
    reader.readAsText(file);
}

function exportAll() {
    const blob = new Blob([JSON.stringify(conversations, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `chatsaver_export_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
}

function searchConversations(q) {
    renderList(q);
}

// Init
updateStats();
renderList();
</script>
</body>
</html>
